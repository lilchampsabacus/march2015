<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abacus 2.0: Battle Zone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="battle-container">
        <header class="battle-header">
            <h1>🔥 BATTLE ZONE 🔥</h1>
            <h3 id="current-level">Level: 1D5R</h3>
            <div class="tug-of-war-container">
                <div class="tug-bar" id="tug-bar"></div>
            </div>
        </header>

        <main class="arena">
            <div class="player-panel left">
                <div class="avatar">🥷</div>
                <h2 class="player-name">You</h2>
                <div class="score" id="score-p1">0</div>
                <input type="number" id="answer-input" placeholder="Type answer..." autofocus>
                <button id="submit-btn" onclick="submitAnswer()">Submit Strike</button>
            </div>

            <div class="question-board">
                <div class="timer" id="timer">10.0s</div>
                <div class="vertical-grid" id="question-grid">
                    </div>
            </div>

            <div class="player-panel right">
                <div class="avatar">🤖</div>
                <h2 class="player-name">Opponent</h2>
                <div class="score" id="score-p2">0</div>
                <div class="opponent-status" id="opp-status">Calculating...</div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
