<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Abacus Pad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center font-sans">

  <div id="login-screen" class="bg-white p-8 rounded-lg shadow-md text-center w-96">
    <h2 class="text-2xl font-bold mb-2 text-blue-600">Li'l Champs Live</h2>
    <p id="room-status" class="text-red-500 font-bold mb-4">🔴 Classroom is closed.</p>
    
    <input type="text" id="student-name" placeholder="Enter your name" class="border-2 p-3 text-xl w-full mb-4 rounded focus:outline-none focus:border-blue-500">
    
    <button id="join-btn" onclick="joinClass()" disabled class="bg-slate-400 text-white px-6 py-3 rounded text-xl w-full cursor-not-allowed transition-colors">
      Waiting for Teacher...
    </button>
  </div>

  <div id="live-pad" class="hidden w-full max-w-2xl bg-white p-10 rounded-xl shadow-2xl text-center">
    <h1 class="text-4xl font-bold mb-8 text-gray-800" id="current-question">🎧 Listen to Teacher...</h1>
    
    <input type="number" id="answer-input" disabled 
           class="border-4 border-gray-300 w-full text-center text-6xl p-4 rounded-xl focus:border-blue-500 focus:outline-none transition-colors"
           placeholder="Your Answer">
    
    <p id="status-message" class="text-xl text-slate-500 font-bold mt-6 hidden"></p>
  </div>

  <script>
    const supabaseUrl = 'https://portal-bridge.ucmas-ambernath-pg.workers.dev';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwYWt3Z3piYmp5d3pjY29haGl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIxOTAyMjQsImV4cCI6MjA3Nzc2NjIyNH0.VNjAhpbMzv9c19-IAg8UF2u28aIhh5OYCjAhcec9dRk';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    
    let myName = "";
    let isTeacherOnline = false;
    let isStudentJoined = false;
    const roomChannel = supabaseClient.channel('room-1');

    // Listen for who is in the room immediately on page load
    roomChannel.on('presence', { event: 'sync' }, () => {
      const newState = roomChannel.presenceState();
      isTeacherOnline = false;

      // Check if the teacher's special tag is in the room
      for (const id in newState) {
        newState[id].forEach(client => {
          if(client.is_teacher) isTeacherOnline = true;
        });
      }
      updateJoinUI();
    });

    roomChannel.on('broadcast', { event: 'teacher-command' }, (payload) => {
        const cmd = payload.payload; 
        const inputField = document.getElementById('answer-input');
        const statusMsg = document.getElementById('status-message');

        if(cmd.action === 'open_pads') {
          document.getElementById('current-question').innerText = "✍️ Type your answer!";
          if(inputField.disabled === true) inputField.value = ""; 
          
          inputField.disabled = false; 
          statusMsg.classList.add('hidden');
          inputField.focus(); 
        }
        else if(cmd.action === 'lock_answers') {
          document.getElementById('current-question').innerText = "🎧 Listen to Teacher...";
          inputField.disabled = true; 
          
          statusMsg.innerText = "🔒 PENS DOWN! Waiting for results...";
          statusMsg.className = "text-xl text-slate-500 font-bold mt-6 block";
          
          roomChannel.send({
            type: 'broadcast',
            event: 'student-answer',
            payload: { name: myName, answer: inputField.value }
          });
        }
        else if(cmd.action === 'grade_answers') {
          const myAnswer = inputField.value.trim();
          const correctAnswer = cmd.correctAnswer.trim();

          if(myAnswer === correctAnswer) {
            statusMsg.innerText = "🎉 Brilliant! Correct Answer! 🎉";
            statusMsg.className = "text-3xl text-green-600 font-bold mt-6 block animate-bounce";
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
          } else {
            statusMsg.innerText = `Correct answer is ${correctAnswer}. Keep going! 💪`;
            statusMsg.className = "text-2xl text-orange-500 font-bold mt-6 block";
          }
        }
    });

    // Subscribe immediately so we can see if teacher is online
    roomChannel.subscribe();

    function updateJoinUI() {
      const joinBtn = document.getElementById('join-btn');
      const statusText = document.getElementById('room-status');

      if(isTeacherOnline) {
        joinBtn.disabled = false;
        joinBtn.className = "bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded text-xl w-full transition-colors";
        joinBtn.innerText = "Join Class";
        statusText.innerText = "🟢 Teacher is in the classroom!";
        statusText.className = "text-green-600 font-bold mb-4";
      } else {
        joinBtn.disabled = true;
        joinBtn.className = "bg-slate-400 text-white px-6 py-3 rounded text-xl w-full cursor-not-allowed transition-colors";
        joinBtn.innerText = "Waiting for Teacher...";
        statusText.innerText = "🔴 Classroom is closed.";
        statusText.className = "text-red-500 font-bold mb-4";

        // If the teacher leaves mid-class, kick the student out to the login screen
        if(isStudentJoined) {
           document.getElementById('login-screen').classList.remove('hidden');
           document.getElementById('live-pad').classList.add('hidden');
           isStudentJoined = false;
           roomChannel.untrack(); 
           alert("The teacher has ended the class.");
        }
      }
    }

    function joinClass() {
      if(!isTeacherOnline) return;
      myName = document.getElementById('student-name').value.trim();
      if(!myName) return alert("Please enter your name!");
      
      isStudentJoined = true;
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('live-pad').classList.remove('hidden');

      // Tell the room that this specific student has joined
      roomChannel.track({ student_name: myName });
    }
  </script>
</body>
</html>
