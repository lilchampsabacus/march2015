<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Control Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-900 h-screen text-white p-8 font-sans overflow-y-auto">

  <div class="max-w-5xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-blue-400">Master Control: Live Broadcast</h1>

    <div class="bg-slate-800 p-4 rounded-lg shadow-lg mb-6 border border-slate-700">
      <h2 class="text-lg font-bold text-slate-300 mb-2 flex items-center gap-2">
        <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></span> 
        Online Students ( <span id="student-count">0</span> )
      </h2>
      <div id="online-list" class="flex flex-wrap gap-2 text-sm">
        <span class="text-slate-500 italic">Waiting for students to join...</span>
      </div>
    </div>

    <div class="bg-slate-800 p-6 rounded-lg shadow-lg mb-8 flex justify-between items-center border border-slate-700">
      <div>
        <h2 class="text-2xl font-bold text-white mb-1">Dictation Mode 🎙️</h2>
        <p class="text-slate-400 text-sm">Teacher will ask sums over Meet, then open pads.</p>
      </div>
      <div class="flex gap-4 items-center">
        <button id="btn-open" onclick="openPads()" class="bg-blue-600 hover:bg-blue-500 w-60 py-4 rounded-xl text-lg font-bold transition shadow-lg text-white">1. Open Pads</button>
        <button id="btn-lock" onclick="lockAnswers()" class="bg-red-600 hover:bg-red-500 w-60 py-4 rounded-xl text-lg font-bold transition shadow-lg text-white">2. Lock ("3,2,1 Show!")</button>
        <button id="btn-clear" onclick="clearBoard()" class="bg-slate-600 hover:bg-slate-500 px-6 py-4 rounded-xl text-lg font-bold transition shadow-lg hidden text-white">Clear Answers</button>
      </div>
    </div>

    <h2 class="text-xl font-semibold mb-4 text-slate-300 border-b border-slate-700 pb-2">Submitted Answers</h2>
    <div id="student-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
      </div>
  </div>

  <script>
    const supabaseUrl = 'https://portal-bridge.ucmas-ambernath-pg.workers.dev';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwYWt3Z3piYmp5d3pjY29haGl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIxOTAyMjQsImV4cCI6MjA3Nzc2NjIyNH0.VNjAhpbMzv9c19-IAg8UF2u28aIhh5OYCjAhcec9dRk';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    
    const roomChannel = supabaseClient.channel('room-1');
    let currentRoomState = 'locked'; 

    roomChannel.on('broadcast', { event: 'student-answer' }, (payload) => {
      const data = payload.payload;
      updateStudentCard(data.name, data.answer);
    });

    roomChannel.on('presence', { event: 'sync' }, () => {
      const newState = roomChannel.presenceState();
      const uniqueStudents = new Set(); 
      
      for (const id in newState) {
        newState[id].forEach(client => {
          if(client.student_name) {
            const neatName = client.student_name.charAt(0).toUpperCase() + client.student_name.slice(1).toLowerCase();
            uniqueStudents.add(neatName);
          }
        });
      }
      updateOnlineUI(Array.from(uniqueStudents));
    });

    roomChannel.on('presence', { event: 'join' }, () => {
      if(currentRoomState === 'open') {
         roomChannel.send({ type: 'broadcast', event: 'teacher-command', payload: { action: 'open_pads' } });
      }
    });

    roomChannel.subscribe();

    function openPads() {
      currentRoomState = 'open';
      document.getElementById('student-grid').innerHTML = ""; 
      roomChannel.send({ type: 'broadcast', event: 'teacher-command', payload: { action: 'open_pads' } });

      // === UI CHANGES FOR OPEN STATE ===
      const btnOpen = document.getElementById('btn-open');
      const btnLock = document.getElementById('btn-lock');
      const btnClear = document.getElementById('btn-clear');

      // Make Open button Green
      btnOpen.className = "bg-green-500 hover:bg-green-400 w-60 py-4 rounded-xl text-lg font-bold transition shadow-lg text-white";
      btnOpen.innerText = "🟢 Pads OPEN!";
      
      // Make Lock button Red and ready
      btnLock.className = "bg-red-600 hover:bg-red-500 w-60 py-4 rounded-xl text-lg font-bold transition shadow-lg text-white";
      btnLock.innerText = "2. Lock Answers";

      // Hide clear button
      btnClear.classList.add('hidden');
    }

    function lockAnswers() {
      currentRoomState = 'locked';
      roomChannel.send({ type: 'broadcast', event: 'teacher-command', payload: { action: 'lock_answers' } });

      // === UI CHANGES FOR LOCKED STATE ===
      const btnOpen = document.getElementById('btn-open');
      const btnLock = document.getElementById('btn-lock');
      const btnClear = document.getElementById('btn-clear');

      // Return Open button to Blue
      btnOpen.className = "bg-blue-600 hover:bg-blue-500 w-60 py-4 rounded-xl text-lg font-bold transition shadow-lg text-white";
      btnOpen.innerText = "1. Open Pads";
      
      // Gray out the Lock button to show it's already locked
      btnLock.className = "bg-slate-700 text-slate-400 w-60 py-4 rounded-xl text-lg font-bold transition shadow-lg cursor-not-allowed";
      btnLock.innerText = "🔒 Locked";

      // Show the Clear Answers button!
      btnClear.classList.remove('hidden');
    }

    // NEW FUNCTION: Clear the board manually
    function clearBoard() {
      document.getElementById('student-grid').innerHTML = "";
      document.getElementById('btn-clear').classList.add('hidden');
    }

    function updateOnlineUI(studentsList) {
      const container = document.getElementById('online-list');
      document.getElementById('student-count').innerText = studentsList.length;
      
      if(studentsList.length === 0) {
        container.innerHTML = '<span class="text-slate-500 italic">No students online yet...</span>';
        return;
      }

      container.innerHTML = studentsList.sort().map(name => 
        `<span class="bg-blue-900 text-blue-200 px-3 py-1 rounded-full border border-blue-700">${name}</span>`
      ).join('');
    }

    function updateStudentCard(name, answer) {
      const grid = document.getElementById('student-grid');
      const card = document.createElement('div');
      
      card.className = "bg-slate-800 p-4 rounded-lg border border-slate-600 text-center shadow-md";
      card.innerHTML = `
        <h3 class="text-lg font-bold text-slate-300 mb-2 truncate">${name}</h3>
        <p class="text-4xl text-green-400 font-bold bg-slate-900 py-4 rounded border border-slate-700">${answer || "---"}</p>
      `;
      grid.appendChild(card);
    }
  </script>
</body>
</html>
