<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Teacher Control Center | Li'l Champs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }
  </style>
</head>
<body class="bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-indigo-950 to-slate-950 h-screen text-white p-4 sm:p-8 overflow-y-auto selection:bg-cyan-500 selection:text-white">

  <div class="max-w-6xl mx-auto">
    <div class="mb-8">
      <div class="text-cyan-400 font-bold uppercase tracking-[0.2em] text-xs mb-2 opacity-80 drop-shadow-md">
        Li'l Champs Abacus Academy, Ambernath
      </div>
      
      <div class="flex items-center justify-between">
        <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 drop-shadow-lg">
          Master Control <span class="text-white opacity-50 font-light">| Live</span>
        </h1>
        <div class="hidden sm:block px-4 py-1 rounded-full bg-white/10 border border-white/20 backdrop-blur-md text-xs font-bold text-cyan-300 uppercase tracking-widest shadow-[0_0_15px_rgba(34,211,238,0.2)]">
          Secure Encrypted Session
        </div>
      </div>
    </div>

    <div class="bg-white/5 backdrop-blur-xl p-5 rounded-2xl shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] mb-6 border border-white/10 relative overflow-hidden group">
      <div class="absolute -right-20 -top-20 w-40 h-40 bg-cyan-500/20 rounded-full blur-3xl transition-transform duration-700 group-hover:scale-150"></div>
      
      <h2 class="text-lg font-bold text-slate-200 mb-3 flex items-center gap-3">
        <span class="relative flex h-4 w-4">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-4 w-4 bg-emerald-500 shadow-[0_0_10px_rgba(16,185,129,0.8)]"></span>
        </span>
        Live Roster ( <span id="student-count" class="text-cyan-400 font-extrabold">0</span> )
      </h2>
      <div id="online-list" class="flex flex-wrap gap-2 text-sm z-10 relative">
        <span class="text-slate-400 italic font-light">Awaiting connections...</span>
      </div>
    </div>

    <div class="bg-white/5 backdrop-blur-xl p-6 sm:p-8 rounded-3xl shadow-[0_8px_32px_0_rgba(0,0,0,0.3)] mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-6 border border-white/10 relative overflow-hidden">
      <div class="w-full md:w-auto z-10">
        <h2 class="text-2xl font-extrabold text-white mb-1 flex items-center gap-2">
          🎙️ Dictation Mode
        </h2>
        <p class="text-slate-400 text-sm font-light">Call sums verbally, then trigger pads.</p>
      </div>
      <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto items-center z-10">
        <button id="btn-open" onclick="openPads()" class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-400 hover:to-indigo-500 w-full sm:w-56 py-4 rounded-2xl text-lg font-extrabold transition-all duration-300 shadow-[0_0_20px_rgba(59,130,246,0.4)] hover:shadow-[0_0_30px_rgba(59,130,246,0.6)] hover:-translate-y-1 text-white border border-blue-400/50">
          1. Open Pads
        </button>
        <button id="btn-lock" onclick="lockAnswers()" class="bg-gradient-to-r from-rose-500 to-red-600 hover:from-rose-400 hover:to-red-500 w-full sm:w-56 py-4 rounded-2xl text-lg font-extrabold transition-all duration-300 shadow-[0_0_20px_rgba(244,63,94,0.4)] hover:shadow-[0_0_30px_rgba(244,63,94,0.6)] hover:-translate-y-1 text-white border border-rose-400/50">
          2. Lock Answers
        </button>
        <button id="btn-clear" onclick="clearBoard()" class="bg-white/10 hover:bg-white/20 backdrop-blur-md px-6 py-4 rounded-2xl text-lg font-bold transition-all duration-300 hidden text-slate-200 border border-white/20 w-full sm:w-auto hover:-translate-y-1">
          Clear Board
        </button>
      </div>
    </div>

    <div id="grading-panel" class="hidden bg-gradient-to-br from-indigo-900/80 to-purple-900/80 backdrop-blur-xl p-6 sm:p-8 rounded-3xl shadow-[0_0_40px_rgba(139,92,246,0.2)] mb-8 border border-purple-500/30 flex flex-col sm:flex-row gap-6 items-start sm:items-end w-full relative overflow-hidden">
      <div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20"></div>
      
      <div class="w-full sm:flex-grow z-10">
        <label class="block text-sm mb-3 text-purple-300 font-bold tracking-wide uppercase">✨ Master Answer Key</label>
        <input type="number" id="correct-answer-input" class="w-full bg-black/40 p-4 rounded-2xl text-3xl border border-purple-500/50 focus:border-purple-400 focus:ring-4 focus:ring-purple-500/20 focus:outline-none text-white font-extrabold transition-all" placeholder="e.g. 175">
      </div>
      <button onclick="sendGrades()" class="bg-gradient-to-r from-purple-500 to-fuchsia-600 hover:from-purple-400 hover:to-fuchsia-500 w-full sm:w-auto px-10 py-4 rounded-2xl text-xl font-extrabold transition-all duration-300 shadow-[0_0_30px_rgba(168,85,247,0.5)] hover:shadow-[0_0_40px_rgba(168,85,247,0.7)] hover:-translate-y-1 text-white border border-fuchsia-400/50 z-10 flex items-center justify-center gap-2">
        🏆 Grade Now
      </button>
    </div>

    <div class="flex items-center justify-between mb-4 border-b border-white/10 pb-2">
      <h2 class="text-xl font-bold text-slate-300 tracking-wide">Live Submissions</h2>
    </div>
    
    <div id="student-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 sm:gap-6">
      </div>
  </div>

  <script>
    const supabaseUrl = 'https://portal-bridge.ucmas-ambernath-pg.workers.dev';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlwYWt3Z3piYmp5d3pjY29haGl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIxOTAyMjQsImV4cCI6MjA3Nzc2NjIyNH0.VNjAhpbMzv9c19-IAg8UF2u28aIhh5OYCjAhcec9dRk';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    
    const teacherId = 'teacher-' + Math.random().toString(36).substr(2, 9);
    const roomChannel = supabaseClient.channel('room-1', {
      config: { presence: { key: teacherId } }
    });
    
    let currentRoomState = 'locked'; 
    
    // === FIX: Better State Trackers ===
    let readyStudents = new Set();
    let currentOnlineStudents = new Set(); // Tracks exactly who is online right now
    let totalOnlineCount = 0;

    // 1. Receive Answer (FIXED: Normalize name)
    roomChannel.on('broadcast', { event: 'student-answer' }, (payload) => {
      const data = payload.payload;
      const neatName = data.name.trim().charAt(0).toUpperCase() + data.name.trim().slice(1).toLowerCase();
      updateStudentCard(neatName, data.answer);
    });

    // 2. Track Typing Status (FIXED: Normalize name)
    roomChannel.on('broadcast', { event: 'student-status' }, (payload) => {
      const data = payload.payload;
      const neatName = data.name.trim().charAt(0).toUpperCase() + data.name.trim().slice(1).toLowerCase();
      
      if(data.isReady) {
        readyStudents.add(neatName);
      } else {
        readyStudents.delete(neatName); 
      }
      updateReadyUI();
    });

    // 3. Track Presence (Who is online)
    roomChannel.on('presence', { event: 'sync' }, () => {
      const newState = roomChannel.presenceState();
      const uniqueStudents = new Set(); 
      for (const id in newState) {
        newState[id].forEach(client => {
          if(client.student_name) {
            const neatName = client.student_name.trim().charAt(0).toUpperCase() + client.student_name.trim().slice(1).toLowerCase();
            uniqueStudents.add(neatName);
          }
        });
      }
      
      // Update global trackers
      currentOnlineStudents = uniqueStudents;
      totalOnlineCount = currentOnlineStudents.size;
      
      updateOnlineUI(Array.from(currentOnlineStudents));
      updateReadyUI(); // Refresh button to drop offline students from the count
    });

    roomChannel.on('presence', { event: 'join' }, () => {
      if(currentRoomState === 'open') {
         roomChannel.send({ type: 'broadcast', event: 'teacher-command', payload: { action: 'open_pads' } });
      }
    });

    roomChannel.subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await roomChannel.track({ is_teacher: true });
        roomChannel.send({ type: 'broadcast', event: 'teacher-command', payload: { action: 'ping' } });
      }
    });

    function openPads() {
      currentRoomState = 'open';
      readyStudents.clear(); // Wipe the ready list clean
      document.getElementById('student-grid').innerHTML = ""; 
      roomChannel.send({ type: 'broadcast', event: 'teacher-command', payload: { action: 'open_pads' } });

      const btnOpen = document.getElementById('btn-open');
      const btnLock = document.getElementById('btn-lock');
      const btnClear = document.getElementById('btn-clear');
      const gradingPanel = document.getElementById('grading-panel');

      btnOpen.className = "bg-gradient-to-r from-emerald-400 to-green-500 w-full sm:w-56 py-4 rounded-2xl text-lg font-extrabold transition-all duration-300 shadow-[0_0_25px_rgba(52,211,153,0.6)] text-white border border-emerald-300/50";
      btnOpen.innerText = "🟢 PADS OPEN!";
      
      btnLock.className = "bg-gradient-to-r from-rose-500 to-red-600 hover:from-rose-400 hover:to-red-500 w-full sm:w-56 py-4 rounded-2xl text-lg font-extrabold transition-all duration-300 shadow-[0_0_20px_rgba(244,63,94,0.4)] hover:shadow-[0_0_30px_rgba(244,63,94,0.6)] hover:-translate-y-1 text-white border border-rose-400/50";
      
      btnClear.classList.add('hidden');
      gradingPanel.classList.add('hidden');
      document.getElementById('correct-answer-input').value = "";
      
      updateReadyUI();
    }

    // === FIX: Accurate Ready Counter ===
    function updateReadyUI() {
      const btnLock = document.getElementById('btn-lock');
      
      if (currentRoomState === 'open') {
        // Only count students who are BOTH ready AND currently online
        let actualReadyCount = 0;
        readyStudents.forEach(name => {
          if (currentOnlineStudents.has(name)) {
            actualReadyCount++;
          }
        });

        btnLock.innerText = `2. Lock (${actualReadyCount}/${totalOnlineCount} Ready)`;
        
        if(totalOnlineCount > 0 && actualReadyCount === totalOnlineCount) {
          btnLock.classList.add('animate-pulse');
        } else {
          btnLock.classList.remove('animate-pulse');
        }
      }
    }

    function lockAnswers() {
      currentRoomState = 'locked';
      roomChannel.send({ type: 'broadcast', event: 'teacher-command', payload: { action: 'lock_answers' } });

      const btnOpen = document.getElementById('btn-open');
      const btnLock = document.getElementById('btn-lock');
      const btnClear = document.getElementById('btn-clear');
      const gradingPanel = document.getElementById('grading-panel');

      btnOpen.className = "bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-400 hover:to-indigo-500 w-full sm:w-56 py-4 rounded-2xl text-lg font-extrabold transition-all duration-300 shadow-[0_0_20px_rgba(59,130,246,0.4)] hover:shadow-[0_0_30px_rgba(59,130,246,0.6)] hover:-translate-y-1 text-white border border-blue-400/50";
      btnOpen.innerText = "1. Open Pads";
      
      btnLock.classList.remove('animate-pulse');
      btnLock.className = "bg-white/5 backdrop-blur-md text-slate-500 w-full sm:w-56 py-4 rounded-2xl text-lg font-extrabold transition-all duration-300 cursor-not-allowed border border-white/10";
      btnLock.innerText = "🔒 Locked";

      btnClear.classList.remove('hidden');
      gradingPanel.classList.remove('hidden');
      document.getElementById('correct-answer-input').focus();
    }

    function sendGrades() {
      const correctAns = document.getElementById('correct-answer-input').value.trim();
      if(!correctAns) return alert("Please enter the correct answer first!");

      roomChannel.send({ 
        type: 'broadcast', 
        event: 'teacher-command', 
        payload: { action: 'grade_answers', correctAnswer: correctAns } 
      });

      const cards = document.querySelectorAll('.student-card');
      cards.forEach(card => {
        const studentAnsElement = card.querySelector('.student-answer-text');
        const studentAns = studentAnsElement.innerText;

        if(studentAns === correctAns) {
          card.className = "student-card bg-emerald-500/10 backdrop-blur-xl p-5 rounded-3xl border border-emerald-400/50 text-center shadow-[0_0_30px_rgba(52,211,153,0.3)] transition-all duration-500 transform hover:scale-105 flex flex-col justify-center h-full relative overflow-hidden";
          card.innerHTML += `<div class="absolute inset-0 bg-gradient-to-tr from-transparent via-emerald-400/10 to-transparent pointer-events-none glowing-flare"></div>`;
          studentAnsElement.className = "student-answer-text text-5xl text-emerald-400 font-extrabold drop-shadow-[0_0_15px_rgba(52,211,153,0.8)] mt-2";
        } else {
          card.className = "student-card bg-rose-500/5 backdrop-blur-md p-5 rounded-3xl border border-rose-500/30 text-center shadow-lg transition-all duration-500 opacity-80 flex flex-col justify-center h-full";
          studentAnsElement.className = "student-answer-text text-4xl text-rose-400 font-extrabold opacity-70 line-through mt-2";
        }
      });
    }

    function clearBoard() {
      document.getElementById('student-grid').innerHTML = "";
      document.getElementById('btn-clear').classList.add('hidden');
      document.getElementById('grading-panel').classList.add('hidden');

      roomChannel.send({ 
        type: 'broadcast', 
        event: 'teacher-command', 
        payload: { action: 'clear_board' } 
      });
    }

    function updateOnlineUI(studentsList) {
      const container = document.getElementById('online-list');
      document.getElementById('student-count').innerText = studentsList.length;
      if(studentsList.length === 0) {
        container.innerHTML = '<span class="text-slate-400 italic font-light">Awaiting connections...</span>';
        return;
      }
      container.innerHTML = studentsList.sort().map(name => 
        `<span class="bg-cyan-500/20 text-cyan-300 px-4 py-1.5 rounded-full border border-cyan-500/30 font-semibold shadow-[0_0_10px_rgba(6,182,212,0.2)] flex items-center gap-2">
          <div class="w-1.5 h-1.5 rounded-full bg-cyan-400"></div> ${name}
        </span>`
      ).join('');
    }

    // === FIX: Prevent Duplicate Cards ===
    function updateStudentCard(name, answer) {
      const grid = document.getElementById('student-grid');
      
      // Create a unique HTML ID based on the student's name
      const safeId = 'card-' + name.replace(/[^a-zA-Z0-9]/g, '-').toLowerCase();
      let card = document.getElementById(safeId);

      // If the card doesn't exist yet, create it. If it DOES exist, we just update it!
      if (!card) {
        card = document.createElement('div');
        card.id = safeId;
        grid.appendChild(card);
      }

      card.className = "student-card bg-white/5 backdrop-blur-xl p-5 rounded-3xl border border-white/10 text-center shadow-xl transition-all duration-300 hover:bg-white/10 flex flex-col justify-center min-h-[160px]";
      card.innerHTML = `
        <h3 class="text-lg font-bold text-slate-300 truncate tracking-wide uppercase opacity-80">${name}</h3>
        <div class="flex-grow flex items-center justify-center">
          <p class="student-answer-text text-5xl text-white font-extrabold drop-shadow-md">${answer || "---"}</p>
        </div>
      `;
    }
  </script>
</body>
</html>
